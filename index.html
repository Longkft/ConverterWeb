<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Playable Network Converter</title>
    <!-- Tailwind CSS for fast, beautiful styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- JSZip for packaging files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver for triggering download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-8 selection:bg-indigo-500 selection:text-white">
    <div class="max-w-5xl mx-auto space-y-8 animate-fade-in-up">
        
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
                Luna Playable Converter
            </h1>
            <p class="text-gray-400 text-sm">Automatically convert Luna Playables to multiple Ad Networks</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Settings Panel -->
            <div class="bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-700/50 space-y-6">
                <h2 class="text-xl font-bold flex items-center space-x-2">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>Naming Configuration</span>
                </h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-wide">Game Name</label>
                        <input type="text" id="gameName" placeholder="e.g. MyGame" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-wide">PA Name (Level)</label>
                        <input type="text" id="paName" placeholder="e.g. Lvl1" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-wide">Creator Name</label>
                        <input type="text" id="creatorName" placeholder="e.g. Thanh" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-wide">Date Code</label>
                        <input type="text" id="dateCode" placeholder="DDMMYY" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
                    </div>
                </div>

                </div>

                <!-- Custom Links -->
                <div class="pt-4 border-t border-gray-700/50 space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="flex items-center space-x-2 text-xs font-medium text-gray-400 tracking-wide cursor-pointer group">
                            <input type="checkbox" id="overrideLinksCb" class="w-4 h-4 text-indigo-500 bg-gray-900 border-gray-600 rounded focus:ring-indigo-500 focus:ring-2">
                            <span class="group-hover:text-white transition-colors uppercase">Override Store Links</span>
                        </label>
                    </div>
                    
                    <div class="grid grid-cols-1 gap-3 opacity-50 pointer-events-none transition-all duration-300" id="customLinksContainer">
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-gray-500">Android Link <span class="text-gray-600 font-normal lowercase">(Bỏ trống để giữ link gốc)</span></label>
                            <input type="text" id="androidLinkInput" placeholder="Ví dụ: https://play.google.com/..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-gray-300" disabled>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-gray-500">iOS Link <span class="text-gray-600 font-normal lowercase">(Bỏ trống để giữ link gốc)</span></label>
                            <input type="text" id="iosLinkInput" placeholder="Ví dụ: https://apps.apple.com/..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-gray-300" disabled>
                        </div>
                    </div>
                </div>

                <!-- Networks -->
                <div class="pt-4 border-t border-gray-700/50">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-xs font-medium text-gray-400 uppercase tracking-wide">Target Ad Networks</label>
                        <button id="selectAllBtn" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">Select All</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3" id="networksContainer">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Upload & Progress Panel -->
            <div class="space-y-6">
                <!-- Dropzone -->
                <div id="dropzone" class="bg-gray-800 rounded-2xl p-8 border-2 border-dashed border-gray-600 hover:border-indigo-500 hover:bg-gray-800/80 transition-all cursor-pointer group flex flex-col items-center justify-center h-64 relative overflow-hidden text-center">
                    <input type="file" id="fileInput" accept=".html" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <div class="z-0 pointer-events-none transform group-hover:scale-110 transition-transform duration-300">
                        <div id="dropzoneIcon" class="w-16 h-16 bg-gradient-to-br from-indigo-500/20 to-purple-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/30 text-indigo-400">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-200" id="dropzoneTitle">Drop Luna HTML file here</h3>
                        <p class="text-xs text-gray-400 mt-2" id="dropzoneSubtitle">Alternatively, click to browse files</p>
                    </div>
                </div>

                <!-- Action Button -->
                <button id="convertBtn" disabled class="w-full relative overflow-hidden bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50 transform transition-all duration-300 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none flex items-center justify-center space-x-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <span>Convert & Download ZIP</span>
                </button>
                
                <!-- Output Log -->
                <div id="logArea" class="bg-gray-900 border border-gray-700/50 rounded-xl p-4 h-32 overflow-y-auto text-xs font-mono text-gray-300 opacity-80 hidden">
                    <div class="text-green-400 mb-1">> Waiting for file...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
